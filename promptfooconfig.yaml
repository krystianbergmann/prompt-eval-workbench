# Single Promptfoo file. Run: npm run test:promptfoo
# Needs OPENAI_API_KEY in .env (same as Streamlit).

description: Prompt eval smoke tests

prompts:
  - |
    You are a concise assistant. Follow any format instructions in the question.

    User question:
    {{question}}

providers:
  - id: openai:chat:gpt-4o-mini
    config:
      temperature: 0
      max_tokens: 256

tests:
  - description: Capital of France
    vars:
      question: "What is the capital of France? Reply with the city name only, no punctuation."
    assert:
      - type: icontains
        value: Paris

  - description: Multiplication 7×8
    vars:
      question: "Compute 7 multiplied by 8. Reply with digits only (the number), nothing else."
    assert:
      - type: regex
        value: "\\b56\\b"

  - description: Home planet
    vars:
      question: "What planet do humans mostly live on? Reply with one word, the planet name only."
    assert:
      - type: icontains
        value: Earth
