# Smoke tests — expand with real benchmarks (e.g. MMLU-style rows) later.
- description: Geography — capital of France
  vars:
    question: "What is the capital of France? Reply with the city name only, no punctuation."
  assert:
    - type: icontains
      value: Paris

- description: Arithmetic — multiplication
  vars:
    question: "Compute 7 multiplied by 8. Reply with digits only (the number), nothing else."
  assert:
    - type: regex
      value: "\\b56\\b"

# Quick install / wiring check — should pass with any reasonable chat model.
- description: Install check — one-word astronomy fact
  vars:
    question: "What planet do humans mostly live on? Reply with one word, the planet name only."
  assert:
    - type: icontains
      value: Earth
